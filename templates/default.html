<!doctype html>
<html>
  <body>
    <div
      style='background-color:#F5F5F5;color:#242424;font-family:Optima, Candara, "Noto Sans", source-sans-pro, sans-serif;font-size:16px;font-weight:400;letter-spacing:0.15008px;line-height:1.5;margin:0;padding:32px 0;min-height:100%;width:100%'
    >
      <table
        align="center"
        width="100%"
        style="margin:0 auto;max-width:600px;background-color:#F5F5F5"
        role="presentation"
        cellspacing="0"
        cellpadding="0"
        border="0"
      >
        <tbody>
          <tr style="width:100%">
            <td>
              <div style="background-color:#f5f5f5;padding:16px 24px 16px 24px">
                <table
                  align="center"
                  width="100%"
                  cellpadding="0"
                  border="0"
                  style="table-layout:fixed;border-collapse:collapse"
                >
                  <tbody style="width:100%">
                    <tr style="width:100%">
                      <td
                        style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                      >
                        <div style="padding:0px 0px 0px 0px">
                          <div style="padding:0px 0px 0px 0px;text-align:left">
                            <a
                              href="{{siteur}}"
                              style="text-decoration:none"
                              target="_blank"
                              ><img
                                alt="Site Logo"
                                src="{{logourl}}"
                                width="150"
                                style="width:150px;outline:none;border:none;text-decoration:none;vertical-align:middle;display:inline-block;max-width:100%"
                            /></a>
                          </div>
                        </div>
                      </td>
                      <td
                        style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                      >
                        <div style="padding:0px 0px 0px 0px"></div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div style="height:24px"></div>
              <div style="background-color:#ffffff;padding:16px 24px 24px 24px">
                <h3
                  style="font-weight:normal;text-align:left;margin:0;font-size:20px;padding:16px 0px 16px 0px"
                >
                  Form Submission
                </h3>
                <div style="padding:0px 0px 0px 0px">
                  <div style="padding:8px 0px 8px 0px">
                    <hr
                      style="width:100%;border:none;border-top:1px solid #EEEEEE;margin:0"
                    />
                  </div>
                </div>
                <div style="padding:8px 0px 8px 0px">
                  <table
                    align="center"
                    width="100%"
                    cellpadding="0"
                    border="0"
                    style="table-layout:fixed;border-collapse:collapse"
                  >
                    <tbody style="width:100%">
                      <tr style="width:100%">
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:left;padding:0px 0px 0px 0px"
                            >
                              First Name
                            </div>
                          </div>
                        </td>
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:right;padding:0px 0px 0px 0px"
                            >
                              {{firstname}}
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style="padding:8px 0px 8px 0px">
                  <table
                    align="center"
                    width="100%"
                    cellpadding="0"
                    border="0"
                    style="table-layout:fixed;border-collapse:collapse"
                  >
                    <tbody style="width:100%">
                      <tr style="width:100%">
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:left;padding:0px 0px 0px 0px"
                            >
                              Last Name
                            </div>
                          </div>
                        </td>
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:right;padding:0px 0px 0px 0px"
                            >
                              {{lastname}}
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style="padding:8px 0px 8px 0px">
                  <table
                    align="center"
                    width="100%"
                    cellpadding="0"
                    border="0"
                    style="table-layout:fixed;border-collapse:collapse"
                  >
                    <tbody style="width:100%">
                      <tr style="width:100%">
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:left;padding:0px 0px 0px 0px"
                            >
                              Email
                            </div>
                          </div>
                        </td>
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:right;padding:0px 0px 0px 0px"
                            >
                              {{email}}
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style="padding:8px 0px 8px 0px">
                  <table
                    align="center"
                    width="100%"
                    cellpadding="0"
                    border="0"
                    style="table-layout:fixed;border-collapse:collapse"
                  >
                    <tbody style="width:100%">
                      <tr style="width:100%">
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:left;padding:0px 0px 0px 0px"
                            >
                              Phone
                            </div>
                          </div>
                        </td>
                        <td
                          style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:right;padding:0px 0px 0px 0px"
                            >
                              {{lastname}}
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style="padding:8px 0px 8px 0px">
                  <hr
                    style="width:100%;border:none;border-top:1px solid #EEEEEE;margin:0"
                  />
                </div>
                <div
                  style='color:#474849;font-size:14px;font-family:Optima, Candara, "Noto Sans", source-sans-pro, sans-serif;font-weight:bold;text-align:left;padding:16px 0px 16px 0px'
                >
                  META DATA
                </div>
                <div style="padding:8px 0px 8px 0px">
                  <table
                    align="center"
                    width="100%"
                    cellpadding="0"
                    border="0"
                    style="table-layout:fixed;border-collapse:collapse"
                  >
                    <tbody style="width:100%">
                      <tr style="width:100%">
                        <td
                          style="box-sizing:content-box;vertical-align:top;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:left;padding:0px 0px 0px 0px"
                            >
                              Timestamp:
                            </div>
                          </div>
                        </td>
                        <td
                          style="box-sizing:content-box;vertical-align:top;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:right;padding:0px 0px 0px 0px"
                            >
                              [timestamp]
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style="padding:8px 0px 8px 0px">
                  <table
                    align="center"
                    width="100%"
                    cellpadding="0"
                    border="0"
                    style="table-layout:fixed;border-collapse:collapse"
                  >
                    <tbody style="width:100%">
                      <tr style="width:100%">
                        <td
                          style="box-sizing:content-box;vertical-align:top;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:left;padding:0px 0px 0px 0px"
                            >
                              IP Address:
                            </div>
                          </div>
                        </td>
                        <td
                          style="box-sizing:content-box;vertical-align:top;padding-left:0;padding-right:0"
                        >
                          <div style="padding:0px 0px 0px 0px">
                            <div
                              style="font-size:14px;font-weight:bold;text-align:right;padding:0px 0px 0px 0px"
                            >
                              [ip]
                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div
                style="color:#474849;font-size:12px;font-weight:normal;text-align:center;padding:24px 24px 16px 24px"
              >
                This form has been submitted with CF2M
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
